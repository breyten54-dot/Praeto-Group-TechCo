<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-label="Praeto Group TechCo logo">
  <defs>
    <style>
      .bg { fill: #05060a; }
      .frame { fill: none; stroke: #1c3a34; stroke-width: 2; }
      .digit { fill: #1a9c6c; font-family: 'Courier New', monospace; font-size: 14px; }
      .digit-dim { fill: #115540; }
      .line { stroke: #1a9c6c; stroke-width: 2; fill: none; }
      .circle { fill: #0f3d2d; stroke: #1a9c6c; stroke-width: 1.5; }
      .title { fill: #f4f6fb; font-family: 'Inter', system-ui, sans-serif; font-weight: 800; font-size: 58px; letter-spacing: 4px; }
      .subtitle { fill: #1a9c6c; font-family: 'Courier New', monospace; font-weight: 700; font-size: 18px; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="400" height="400" rx="20"/>
  <rect class="frame" x="8" y="8" width="384" height="384" rx="16"/>

  <!-- Binary rain / scattered digits -->
  <g class="binary-cluster">
    <text class="digit-dim" x="45" y="55">0</text>
    <text class="digit" x="65" y="50">1</text>
    <text class="digit-dim" x="85" y="60">1</text>
    <text class="digit" x="105" y="45">0</text>
    <text class="digit-dim" x="125" y="55">1</text>
    <text class="digit" x="145" y="50">1</text>
    <text class="digit-dim" x="165" y="65">0</text>
    <text class="digit" x="185" y="48">1</text>

    <text class="digit" x="50" y="90">1</text>
    <text class="digit-dim" x="70" y="100">0</text>
    <text class="digit" x="90" y="85">0</text>
    <text class="digit-dim" x="110" y="95">1</text>
    <text class="digit" x="130" y="88">1</text>
    <text class="digit-dim" x="150" y="105">0</text>
    <text class="digit" x="170" y="92">1</text>

    <text class="digit-dim" x="55" y="135">0</text>
    <text class="digit" x="75" y="125">1</text>
    <text class="digit-dim" x="95" y="140">1</text>
    <text class="digit" x="115" y="130">0</text>
    <text class="digit-dim" x="135" y="145">0</text>
    <text class="digit" x="155" y="128">1</text>

    <text class="digit" x="60" y="175">1</text>
    <text class="digit-dim" x="80" y="185">0</text>
    <text class="digit" x="100" y="170">0</text>
    <text class="digit-dim" x="120" y="180">1</text>
    <text class="digit" x="140" y="168">1</text>

    <text class="digit-dim" x="65" y="220">0</text>
    <text class="digit" x="85" y="210">1</text>
    <text class="digit-dim" x="105" y="225">1</text>
    <text class="digit" x="125" y="215">0</text>
    <text class="digit-dim" x="145" y="230">0</text>

    <text class="digit" x="70" y="265">1</text>
    <text class="digit-dim" x="90" y="275">0</text>
    <text class="digit" x="110" y="260">1</text>
    <text class="digit-dim" x="130" y="270">1</text>

    <text class="digit-dim" x="75" y="310">0</text>
    <text class="digit" x="95" y="300">1</text>
    <text class="digit-dim" x="115" y="315">0</text>
    <text class="digit" x="135" y="305">1</text>

    <text class="digit" x="80" y="350">1</text>
    <text class="digit-dim" x="100" y="360">0</text>
    <text class="digit" x="120" y="345">1</text>
  </g>

  <!-- Highlighted circles with digits -->
  <circle class="circle" cx="75" cy="72" r="14"/>
  <text class="digit" x="70" y="77" style="font-size: 13px; fill: #f4f6fb;">1</text>

  <circle class="circle" cx="135" cy="62" r="14"/>
  <text class="digit" x="130" y="67" style="font-size: 13px; fill: #f4f6fb;">0</text>

  <circle class="circle" cx="105" cy="150" r="16"/>
  <text class="digit" x="99" y="155" style="font-size: 15px; fill: #f4f6fb;">0</text>

  <circle class="circle" cx="75" cy="240" r="16"/>
  <text class="digit" x="69" y="245" style="font-size: 15px; fill: #f4f6fb;">1</text>

  <circle class="circle" cx="125" cy="330" r="16"/>
  <text class="digit" x="119" y="335" style="font-size: 15px; fill: #f4f6fb;">1</text>

  <!-- Horizontal data line -->
  <line class="line" x1="55" y1="195" x2="340" y2="195"/>
  <text class="digit" x="245" y="188" style="font-size: 12px; letter-spacing: 2px;">0000111100100001</text>

  <!-- Isolated floating digit -->
  <circle class="circle" cx="300" cy="255" r="18"/>
  <text class="digit" x="294" y="260" style="font-size: 16px; fill: #f4f6fb;">0</text>

  <!-- Main title -->
  <text class="title" x="200" y="300" text-anchor="middle">PRAETO</text>
  <text class="subtitle" x="200" y="340" text-anchor="middle">GROUP TECHCO</text>
</svg>
